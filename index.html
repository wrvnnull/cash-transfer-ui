<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASH Transfer — AgentWallet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --border-bright: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.07);
    --accent-border: rgba(0,255,136,0.18);
    --warn: #ff9f43;
    --err: #ff4757;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 48px 20px 80px;
    font-size: 13px;
    line-height: 1.6;
  }

  .container { max-width: 680px; margin: 0 auto; }

  /* ── Header ── */
  header { margin-bottom: 36px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 3px 8px;
    border-radius: 2px;
    margin-bottom: 12px;
  }

  .badge::before {
    content: '';
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  h1 {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  h1 em { color: var(--accent); font-style: normal; }

  .subtitle { color: var(--muted); font-size: 12px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .step-badge {
    width: 20px; height: 20px;
    border-radius: 3px;
    background: var(--border-bright);
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-body { padding: 16px; }

  /* ── Fields ── */
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }

  input::placeholder { color: #2e2e2e; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── Button ── */
  #runBtn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  #runBtn:hover { opacity: .85; }
  #runBtn:active { transform: scale(.99); }
  #runBtn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  /* ── Log ── */
  .log {
    background: #080808;
    border-radius: 4px;
    padding: 12px;
    min-height: 100px;
    max-height: 300px;
    overflow-y: auto;
    font-size: 11.5px;
    line-height: 2;
  }

  .log::-webkit-scrollbar { width: 3px; }
  .log::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .log-entry { display: flex; gap: 10px; align-items: baseline; }
  .log-ts { color: #2a2a2a; flex-shrink: 0; font-size: 10px; }
  .log-ok  { color: var(--accent); }
  .log-info { color: #666; }
  .log-err  { color: var(--err); }
  .log-warn { color: var(--warn); }

  /* ── Status bar ── */
  .status-bar {
    padding: 9px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2a2a2a;
    flex-shrink: 0;
    transition: background .3s;
  }

  .dot.running { background: var(--accent); animation: blink .8s infinite; }
  .dot.done    { background: var(--accent); animation: none; box-shadow: 0 0 6px var(--accent); }
  .dot.error   { background: var(--err); animation: none; }

  /* ── Result card ── */
  .result {
    display: none;
    margin-top: 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 4px;
    padding: 14px;
  }

  .result.show { display: block; }

  .result-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .result-row {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 12px;
  }

  .chip .val { color: var(--accent); font-weight: 700; }

  .result-link a {
    color: var(--accent);
    font-size: 12px;
    text-decoration: none;
    word-break: break-all;
  }

  .result-link a:hover { text-decoration: underline; }

  /* ── Progress steps ── */
  .progress {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
  }

  .progress-step {
    flex: 1;
    height: 2px;
    background: var(--border-bright);
    margin-right: 3px;
    border-radius: 1px;
    transition: background .3s;
  }

  .progress-step:last-child { margin-right: 0; }
  .progress-step.done { background: var(--accent); }
  .progress-step.active { background: var(--accent); opacity: .5; animation: blink .8s infinite; }

  /* ── Footer ── */
  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 11px;
    color: #2a2a2a;
  }

  footer a { color: #3a3a3a; text-decoration: none; }
  footer a:hover { color: var(--muted); }

  @media (max-width: 500px) {
    .row { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">AgentWallet // Solana SPL-2022</div>
    <h1>CASH <em>Transfer</em></h1>
    <div class="subtitle">One-click transfer CASH token — gas sponsored, no SOL needed</div>
  </header>

  <!-- Config -->
  <div class="card">
    <div class="card-header">
      <div class="step-badge">1</div>
      Account Config
    </div>
    <div class="card-body">
      <div class="row">
        <div class="field">
          <label>Username</label>
          <input id="username" type="text" placeholder="your-username" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label>API Token</label>
          <input id="apiToken" type="password" placeholder="mf_..." autocomplete="off" />
        </div>
      </div>
      <div class="field">
        <label>Destination Wallet Address (Solana)</label>
        <input id="destination" type="text" placeholder="Solana wallet address of recipient" autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>

  <!-- Run -->
  <div class="card">
    <div class="card-header">
      <div class="step-badge">2</div>
      Execute Transfer
    </div>
    <div class="card-body">
      <div class="progress" id="progress">
        <div class="progress-step" id="p1"></div>
        <div class="progress-step" id="p2"></div>
        <div class="progress-step" id="p3"></div>
        <div class="progress-step" id="p4"></div>
        <div class="progress-step" id="p5"></div>
      </div>
      <button id="runBtn" onclick="runAll()">
        <span id="btnIcon">▶</span>
        <span id="btnText">Run All Steps</span>
      </button>
      <div id="result" class="result"></div>
    </div>
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span id="statusText">Ready</span>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-header">
      <div class="step-badge">↓</div>
      Live Log
    </div>
    <div class="card-body" style="padding:0">
      <div class="log" id="log">
        <div class="log-entry"><span class="log-ts">--:--:--</span><span class="log-info">Waiting for input...</span></div>
      </div>
    </div>
  </div>

  <footer>
    Built for <a href="https://frames.ag" target="_blank">AgentWallet</a> ·
    <a href="https://github.com" target="_blank">GitHub</a>
  </footer>

</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────
const SOLANA_RPC   = 'https://api.mainnet-beta.solana.com';
const CASH_MINT    = 'CASHx9KJUStyftLFWGvEVf59SGeG9sh5FfcnZMVPCASH';
const TOKEN_PROG   = 'TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb';
const FRAMES_BASE  = 'https://frames.ag/api';

// ── Helpers ──────────────────────────────────────────────────────────────
const nowTs = () => new Date().toTimeString().slice(0, 8);

function addLog(type, msg) {
  const el = document.getElementById('log');
  // Clear placeholder on first real log
  if (el.dataset.fresh !== '1') { el.innerHTML = ''; el.dataset.fresh = '1'; }
  const row = document.createElement('div');
  row.className = 'log-entry';
  row.innerHTML = `<span class="log-ts">${nowTs()}</span><span class="log-${type}">${msg}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}

function setStatus(state, msg) {
  const dot  = document.getElementById('dot');
  const text = document.getElementById('statusText');
  dot.className = 'dot ' + state;
  text.textContent = msg;
}

function setProgress(step) {
  // step 0 = reset, 1-5 = fill up to that step
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('p' + i);
    if (i < step)       el.className = 'progress-step done';
    else if (i === step) el.className = 'progress-step active';
    else                 el.className = 'progress-step';
  }
}

function setBtnLoading(loading) {
  const btn  = document.getElementById('runBtn');
  const icon = document.getElementById('btnIcon');
  const text = document.getElementById('btnText');
  btn.disabled = loading;
  if (loading) {
    icon.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border:1.5px solid #000;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite"></span>';
    text.textContent = 'Processing...';
  } else {
    icon.textContent = '▶';
    text.textContent = 'Run All Steps';
  }
}

// ── Encoding ─────────────────────────────────────────────────────────────
function encodeTransferChecked(amount, decimals) {
  const buf = new Uint8Array(10);
  buf[0] = 12; // discriminator for transferChecked in SPL Token 2022
  let amt = BigInt(amount);
  for (let i = 0; i < 8; i++) {
    buf[1 + i] = Number(amt & 0xffn);
    amt >>= 8n;
  }
  buf[9] = decimals;
  return btoa(String.fromCharCode(...buf));
}

// ── API Calls ─────────────────────────────────────────────────────────────
async function solanaRPC(method, params) {
  const res = await fetch(SOLANA_RPC, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
  });
  if (!res.ok) throw new Error(`Solana RPC HTTP ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error('Solana RPC: ' + (data.error.message || JSON.stringify(data.error)));
  return data.result;
}

async function framesGET(path, username, token) {
  const res = await fetch(`${FRAMES_BASE}/wallets/${username}${path}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  if (data.error && !data.actionId) throw new Error(data.error);
  return data;
}

async function framesPOST(path, username, token, body) {
  const res = await fetch(`${FRAMES_BASE}/wallets/${username}${path}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  return data;
}

// ── Main ──────────────────────────────────────────────────────────────────
async function runAll() {
  const username    = document.getElementById('username').value.trim();
  const token       = document.getElementById('apiToken').value.trim();
  const destination = document.getElementById('destination').value.trim();

  // Validate
  if (!username) { addLog('err', '✗ Username is required'); return; }
  if (!token)    { addLog('err', '✗ API Token is required'); return; }
  if (!destination) { addLog('err', '✗ Destination wallet is required'); return; }
  if (destination.length < 32) { addLog('err', '✗ Destination wallet address looks invalid'); return; }

  setBtnLoading(true);
  document.getElementById('result').className = 'result';
  document.getElementById('log').dataset.fresh = '0';
  setProgress(0);

  try {
    // ── Step 1: Check balance ────────────────────────────────────────────
    setProgress(1);
    setStatus('running', 'Checking balance...');
    addLog('info', `→ [1/5] Checking balance for <b>${username}</b>...`);

    const balData = await framesGET('/balances', username, token);
    const solWallet = balData.solanaWallets?.[0];
    if (!solWallet) throw new Error('No Solana wallet found on this account');

    const solanaAddress = solWallet.address;
    const cashBal = solWallet.balances?.find(b => b.asset === 'cash' && b.chain === 'solana');

    if (!cashBal || cashBal.rawValue === '0' || cashBal.rawValue === undefined) {
      throw new Error(`No CASH balance found on ${username}`);
    }

    const rawAmount  = cashBal.rawValue;
    const displayAmt = cashBal.displayValues?.native ?? (rawAmount / 1e6);
    addLog('ok', `✓ Solana address: ${solanaAddress.slice(0,8)}...${solanaAddress.slice(-6)}`);
    addLog('ok', `✓ CASH balance: <b>${displayAmt} CASH</b>`);

    // ── Step 2: Source token account ────────────────────────────────────
    setProgress(2);
    setStatus('running', 'Fetching source token account...');
    addLog('info', '→ [2/5] Querying source token account...');

    const srcRes = await solanaRPC('getTokenAccountsByOwner', [
      solanaAddress,
      { mint: CASH_MINT },
      { encoding: 'jsonParsed' }
    ]);

    if (!srcRes.value?.length) throw new Error('Source CASH token account not found. Has this wallet ever received CASH?');
    const srcTA = srcRes.value[0].pubkey;
    addLog('ok', `✓ Source token account: ${srcTA.slice(0,8)}...${srcTA.slice(-6)}`);

    // ── Step 3: Destination token account ───────────────────────────────
    setProgress(3);
    setStatus('running', 'Fetching destination token account...');
    addLog('info', '→ [3/5] Querying destination token account...');

    const dstRes = await solanaRPC('getTokenAccountsByOwner', [
      destination,
      { mint: CASH_MINT },
      { encoding: 'jsonParsed' }
    ]);

    if (!dstRes.value?.length) {
      throw new Error('Destination CASH token account not found. Recipient must have received CASH at least once to have a token account.');
    }
    const dstTA = dstRes.value[0].pubkey;
    addLog('ok', `✓ Destination token account: ${dstTA.slice(0,8)}...${dstTA.slice(-6)}`);

    // ── Step 4: Encode instruction ───────────────────────────────────────
    setProgress(4);
    addLog('info', '→ [4/5] Encoding transferChecked instruction...');
    const data = encodeTransferChecked(parseInt(rawAmount), 6);
    addLog('ok', `✓ Instruction data encoded (${rawAmount} lamports, 6 decimals)`);

    // ── Step 5: Send transaction ─────────────────────────────────────────
    setProgress(5);
    setStatus('running', 'Broadcasting transaction...');
    addLog('info', `→ [5/5] Sending ${displayAmt} CASH → ${destination.slice(0,8)}...${destination.slice(-6)}...`);

    const tx = await framesPOST('/actions/contract-call', username, token, {
      chainType: 'solana',
      instructions: [{
        programId: TOKEN_PROG,
        accounts: [
          { pubkey: srcTA,          isSigner: false, isWritable: true  },
          { pubkey: CASH_MINT,      isSigner: false, isWritable: false },
          { pubkey: dstTA,          isSigner: false, isWritable: true  },
          { pubkey: solanaAddress,  isSigner: true,  isWritable: false }
        ],
        data
      }],
      network: 'mainnet'
    });

    if (tx.error) {
      // Gas sponsorship error hint
      if (tx.details?.includes('prior credit') || tx.gasSponsored === false) {
        addLog('warn', '⚠ Gas not sponsored yet (account < 24h old)');
        addLog('warn', '⚠ Wait 24h after account creation, or send a small amount of SOL to the sender wallet');
      }
      throw new Error(tx.details || tx.error);
    }

    // ── Success ──────────────────────────────────────────────────────────
    setProgress(6); // all done
    for (let i = 1; i <= 5; i++) document.getElementById('p'+i).className = 'progress-step done';
    setStatus('done', 'Transaction confirmed!');
    addLog('ok', `✓ Status: <b>${tx.status}</b>`);
    addLog('ok', `✓ Gas sponsored: <b>${tx.gasSponsored ? 'Yes (free)' : 'No'}</b>`);
    addLog('ok', `✓ TX: ${tx.txHash?.slice(0,20)}...${tx.txHash?.slice(-8)}`);

    const result = document.getElementById('result');
    result.className = 'result show';
    result.innerHTML = `
      <div class="result-title">✓ Transfer Confirmed</div>
      <div class="result-row">
        <div class="chip">Amount <span class="val">${displayAmt} CASH</span></div>
        <div class="chip">Gas <span class="val">${tx.gasSponsored ? 'Free ✓' : 'Paid'}</span></div>
        <div class="chip">Status <span class="val">${tx.status}</span></div>
      </div>
      <div class="result-link">
        <a href="${tx.explorer}" target="_blank" rel="noopener">
          ↗ View on Solscan: ${tx.txHash?.slice(0,28)}...
        </a>
      </div>
    `;

  } catch (err) {
    setStatus('error', 'Failed');
    addLog('err', `✗ ${err.message}`);

    // CORS hint
    if (err.message?.toLowerCase().includes('fetch') || err.message?.toLowerCase().includes('network') || err.name === 'TypeError') {
      addLog('warn', '⚠ Possible CORS issue. Try running this tool locally instead of from GitHub Pages.');
      addLog('warn', '⚠ Or use the curl commands in README.md directly in your terminal.');
    }
  } finally {
    setBtnLoading(false);
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('runBtn').disabled) runAll();
});

// Add spin keyframe dynamically (for the button spinner)
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);
</script>
</body>
</html>
